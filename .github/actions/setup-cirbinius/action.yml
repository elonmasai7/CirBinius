name: 'CirBinius Check'
description: 'Compile and prove Circom circuits with CirBinius'
inputs:
  version:
    description: 'CirBinius version to use'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Install CirBinius
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          curl -sSfL "https://github.com/elonmasai7/CirBinius/releases/latest/download/cirbinius-$(uname -s)-$(uname -m).tar.gz" | tar xz -C /usr/local/bin
        else
          curl -sSfL "https://github.com/elonmasai7/CirBinius/releases/download/v${VERSION}/cirbinius-$(uname -s)-$(uname -m).tar.gz" | tar xz -C /usr/local/bin
        fi
        cirbinius doctor
    - name: Verify Installation
      shell: bash
      run: cirbinius --version
